[package]
name = "ssg"
version = "0.1.0"
edition = "2024"

[dependencies]
color-eyre = { version = "0.6.5", default-features = false }
itertools = { version = "0.14.0", default-features = false }
katex = { version = "0.4.6", default-features = false, features = ["quick-js"] }
pulldown-cmark = { version = "0.13.0", default-features = false, features = ["html", "simd"] }
tracing = { version = "0.1.43", default-features = false }
walkdir = { version = "2.5.0", default-features = false }
syntect = { version = "5.3.0", default-features = false, features = ["default-fancy"] }
no-panic = { version = "0.1.35", default-features = false }

[dev-dependencies]
criterion = { version = "0.8.0", features = ["html_reports"] }
proptest = "1.9.0"
proptest-derive = "0.7.0"
tempfile = "3.13.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"

[lib]
name = "libssg"
path = "src/lib/mod.rs"

[[bin]]
name = "ssg"
path = "src/main.rs"

[[bin]]
name = "cold_start_helper"
path = "src/bin/cold_start_helper.rs"

[[bench]]
name = "micro"
harness = false

[[bench]]
name = "component"
harness = false

[[bench]]
name = "renderer_isolation"
harness = false

[[bench]]
name = "html_write"
harness = false

[[bench]]
name = "end_to_end_cpu"
harness = false

[[bench]]
name = "end_to_end_io"
harness = false

[[bench]]
name = "cold_start"
harness = false

[profile.release]
strip = true
lto = true
codegen-units = 1
panic = "abort"

[features]
dhat-heap = []    
dhat-ad-hoc = []  
